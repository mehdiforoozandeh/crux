<text x="326.0" y="93.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">/crux — start tracking a project on drought-resistant crops.</text>
<text x="62" y="124" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="146" r="15" fill="#0f9d8f"/>
<text x="37" y="150.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="128" width="548.8" height="68" rx="15" fill="#eef0f4"/>
<text x="78.0" y="155.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">I&#x27;ll set up a vault and open the project “Improving crop yield under</text>
<text x="78.0" y="177.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">drought.” Good?</text>
<text x="798.0" y="208" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="230" r="15" fill="#4f46e5"/>
<text x="823" y="234.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="743.2" y="212" width="54.8" height="46" rx="15" fill="#4f46e5"/>
<text x="759.2" y="239.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">yes</text>
<text x="62" y="270" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="292" r="15" fill="#0f9d8f"/>
<text x="37" y="296.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="274" width="409.7" height="87" rx="15" fill="#eef0f4"/>
<rect x="72.0" y="286" width="389.7" height="37" rx="9" fill="#111827"/>
<text x="84.0" y="308.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux init &quot;Improving crop yield under drought&quot;</text>
<text x="78.0" y="342.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Done. What&#x27;s the first open question?</text>
<text x="798.0" y="373" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="395" r="15" fill="#4f46e5"/>
<text x="823" y="399.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="249.2" y="377" width="548.8" height="46" rx="15" fill="#4f46e5"/>
<text x="265.2" y="404.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">Whether a mycorrhizal inoculant actually helps when water is scarce.</text>
<text x="62" y="435" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="457" r="15" fill="#0f9d8f"/>
<text x="37" y="461.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="439" width="579.2" height="90" rx="15" fill="#eef0f4"/>
<text x="78.0" y="466.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">That&#x27;s a Question — it has no answer of its own; the hypotheses under it</text>
<text x="78.0" y="488.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">resolve it. Open it as “Do mycorrhizal inoculants increase yield under</text>
<text x="78.0" y="510.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">drought?”</text>
<text x="798.0" y="541" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="563" r="15" fill="#4f46e5"/>
<text x="823" y="567.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="743.2" y="545" width="54.8" height="46" rx="15" fill="#4f46e5"/>
<text x="759.2" y="572.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">yes</text>
<text x="62" y="603" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="625" r="15" fill="#0f9d8f"/>
<text x="37" y="629.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="607" width="393.8" height="106" rx="15" fill="#eef0f4"/>
<rect x="72.0" y="619" width="373.8" height="56" rx="9" fill="#111827"/>
<text x="84.0" y="641.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux ask &quot;Do mycorrhizal inoculants increase</text>
<text x="84.0" y="660.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">         yield under drought?&quot;          → q1</text>
<text x="78.0" y="694.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Your first hypothesis under it?</text>
<text x="798.0" y="725" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="747" r="15" fill="#4f46e5"/>
<text x="823" y="751.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="332.8" y="729" width="465.2" height="46" rx="15" fill="#4f46e5"/>
<text x="348.8" y="756.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">The strain R. irregularis will beat an untreated control.</text>
<text x="62" y="787" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="809" r="15" fill="#0f9d8f"/>
<text x="37" y="813.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="791" width="556.4" height="90" rx="15" fill="#eef0f4"/>
<text x="78.0" y="818.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Falsifiable — good. I&#x27;d pre-register the verifiable as: grain yield ≥</text>
<text x="78.0" y="840.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">+15% vs untreated control at 50% irrigation, p&lt;0.05 across 4 reps. Is</text>
<text x="78.0" y="862.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">+15% the effect you care about?</text>
<text x="798.0" y="893" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="915" r="15" fill="#4f46e5"/>
<text x="823" y="919.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="659.6" y="897" width="138.4" height="46" rx="15" fill="#4f46e5"/>
<text x="675.6" y="924.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">+15% is right.</text>
<text x="62" y="955" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="977" r="15" fill="#0f9d8f"/>
<text x="37" y="981.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="959" width="433.6" height="106" rx="15" fill="#eef0f4"/>
<rect x="72.0" y="971" width="413.6" height="56" rx="9" fill="#111827"/>
<text x="84.0" y="993.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux hypothesize &quot;R. irregularis beats control&quot; \</text>
<text x="84.0" y="1012.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">  -p q1 -v &quot;yield ≥ +15% vs ctrl, p&lt;0.05, 4 reps&quot;</text>
<text x="78.0" y="1046.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">→ h1, an open idea ready to run.</text>
