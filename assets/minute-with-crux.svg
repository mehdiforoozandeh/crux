<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1027" width="860" height="1027" font-family="sans-serif" role="img" aria-label="A minute with crux: a chat where a researcher opens a research question and designs a hypothesis with verifiables">
<text x="798.0" y="26" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="48" r="15" fill="#4f46e5"/>
<text x="823" y="52.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="310.0" y="30" width="488.0" height="46" rx="15" fill="#4f46e5"/>
<text x="326.0" y="57.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">/crux — start a project on our image-classifier experiments.</text>
<text x="62" y="88" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="110" r="15" fill="#0f9d8f"/>
<text x="37" y="114.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="92" width="571.6" height="68" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<text x="78.0" y="119.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">I&#x27;ll set up a vault and open the project “Robust image classification.”</text>
<text x="78.0" y="141.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Good?</text>
<text x="798.0" y="172" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="194" r="15" fill="#4f46e5"/>
<text x="823" y="198.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="743.2" y="176" width="54.8" height="46" rx="15" fill="#4f46e5"/>
<text x="759.2" y="203.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">yes</text>
<text x="62" y="234" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="256" r="15" fill="#0f9d8f"/>
<text x="37" y="260.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="238" width="354.1" height="87" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<rect x="72.0" y="250" width="334.1" height="37" rx="9" fill="#111827"/>
<text x="84.0" y="272.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux init &quot;Robust image classification&quot;</text>
<text x="78.0" y="306.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Done. What&#x27;s the first open question?</text>
<text x="798.0" y="337" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="359" r="15" fill="#4f46e5"/>
<text x="823" y="363.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="294.8" y="341" width="503.2" height="46" rx="15" fill="#4f46e5"/>
<text x="310.8" y="368.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">Whether data augmentation actually helps the model generalize.</text>
<text x="62" y="399" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="421" r="15" fill="#0f9d8f"/>
<text x="37" y="425.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="403" width="579.2" height="68" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<text x="78.0" y="430.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">That&#x27;s a Question — it has no answer of its own; the hypotheses under it</text>
<text x="78.0" y="452.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">resolve it. Open it as “Does data augmentation improve test accuracy?”</text>
<text x="798.0" y="483" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="505" r="15" fill="#4f46e5"/>
<text x="823" y="509.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="743.2" y="487" width="54.8" height="46" rx="15" fill="#4f46e5"/>
<text x="759.2" y="514.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">yes</text>
<text x="62" y="545" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="567" r="15" fill="#0f9d8f"/>
<text x="37" y="571.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="549" width="354.1" height="106" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<rect x="72.0" y="561" width="334.1" height="56" rx="9" fill="#111827"/>
<text x="84.0" y="583.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux ask &quot;Does data augmentation</text>
<text x="84.0" y="602.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">         improve test accuracy?&quot;   → q1</text>
<text x="78.0" y="636.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Your first hypothesis under it?</text>
<text x="798.0" y="667" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="689" r="15" fill="#4f46e5"/>
<text x="823" y="693.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="294.8" y="671" width="503.2" height="46" rx="15" fill="#4f46e5"/>
<text x="310.8" y="698.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">Random crops and flips will beat the no-augmentation baseline.</text>
<text x="62" y="729" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="751" r="15" fill="#0f9d8f"/>
<text x="37" y="755.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="733" width="571.6" height="90" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<text x="78.0" y="760.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">Falsifiable — good. I&#x27;d pre-register the verifiable as: test accuracy ≥</text>
<text x="78.0" y="782.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">+2% vs the no-aug baseline on the held-out set, with no training-time</text>
<text x="78.0" y="804.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">regression. Is +2% the bar you want?</text>
<text x="798.0" y="835" text-anchor="end" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">You</text>
<circle cx="823" cy="857" r="15" fill="#4f46e5"/>
<text x="823" y="861.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Y</text>
<rect x="667.2" y="839" width="130.8" height="46" rx="15" fill="#4f46e5"/>
<text x="683.2" y="866.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#ffffff">+2% is right.</text>
<text x="62" y="897" text-anchor="start" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="600" fill="#9aa1ac">crux</text>
<circle cx="37" cy="919" r="15" fill="#0f9d8f"/>
<text x="37" y="923.5" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff">c</text>
<rect x="62.0" y="901" width="465.4" height="106" rx="15" fill="#edeff3" stroke="#d3d7df" stroke-width="1"/>
<rect x="72.0" y="913" width="445.4" height="56" rx="9" fill="#111827"/>
<text x="84.0" y="935.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">crux hypothesize &quot;crops+flips beat no-aug baseline&quot; \</text>
<text x="84.0" y="954.0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.7" fill="#8ef2c3">  -p q1 -v &quot;test acc ≥ +2% vs baseline, held-out&quot;</text>
<text x="78.0" y="988.0" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14.5" fill="#20242c">→ h1, an open idea ready to run.</text>
</svg>
