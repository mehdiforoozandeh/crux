<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Crux — an agentic research companion: schematic of the crux-tree and the loop">
  <style>
    .ink{fill:#1f2328}.muted{fill:#57606a}.accent{fill:#b8860b}.accent-s{stroke:#b8860b}
    @media (prefers-color-scheme:dark){
      .ink{fill:#e6edf3}.muted{fill:#9aa4b2}.accent{fill:#ffd24a}.accent-s{stroke:#ffd24a}
    }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- ===== logo: Crux / Southern Cross ===== -->
  <g class="accent-s" stroke-opacity=".45" stroke-width="1">
    <line x1="70" y1="32" x2="66" y2="92"/>
    <line x1="44" y1="66" x2="90" y2="61"/>
  </g>
  <g class="accent">
    <circle cx="70" cy="32" r="2.4"/>
    <circle cx="66" cy="92" r="3.2"/>
    <circle cx="44" cy="66" r="2.4"/>
    <circle cx="90" cy="61" r="2.1"/>
    <circle cx="76" cy="78" r="1.4"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="116" y="68" class="accent" font-size="38" font-weight="700">Crux</text>
  <text x="118" y="92" class="muted" font-size="15">an agentic research companion</text>

  <!-- ===== zone labels ===== -->
  <text x="44" y="160" class="muted" font-size="12" letter-spacing="2.5" font-weight="600">CRUX-TREE</text>
  <text x="715" y="160" class="muted" font-size="12" letter-spacing="2.5" font-weight="600">THE LOOP</text>
  <line x1="585" y1="150" x2="585" y2="452" stroke="#8b949e" stroke-opacity=".22"/>

  <!-- ===== CRUX-TREE ===== -->
  <g stroke="#8b949e" stroke-opacity=".7" fill="none">
    <line x1="280" y1="216" x2="196" y2="262"/>
    <line x1="280" y1="216" x2="384" y2="262"/>
    <line x1="390" y1="304" x2="332" y2="350"/>
    <line x1="390" y1="304" x2="468" y2="350"/>
  </g>

  <!-- project (root) -->
  <rect x="220" y="176" width="120" height="40" rx="9" fill="none" class="accent-s" stroke-width="1.4"/>
  <text x="280" y="201" text-anchor="middle" class="ink" font-size="14" font-weight="600">Project</text>

  <!-- questions -->
  <rect x="120" y="262" width="140" height="42" rx="9" fill="none" stroke="#8b949e"/>
  <text x="190" y="288" text-anchor="middle" class="ink" font-size="14">Question</text>
  <rect x="320" y="262" width="140" height="42" rx="9" fill="none" stroke="#8b949e"/>
  <text x="390" y="288" text-anchor="middle" class="ink" font-size="14">Question</text>

  <!-- hypotheses: approved / rejected -->
  <rect x="266" y="350" width="132" height="40" rx="9" fill="none" stroke="#8b949e"/>
  <text x="282" y="375" font-size="13.5"><tspan fill="#2ea043" font-weight="700">✓</tspan><tspan class="ink" dx="6">Hypothesis</tspan></text>
  <rect x="402" y="350" width="132" height="40" rx="9" fill="none" stroke="#8b949e"/>
  <text x="418" y="375" font-size="13.5"><tspan fill="#e5484d" font-weight="700">✕</tspan><tspan class="ink" dx="6">Hypothesis</tspan></text>

  <text x="400" y="424" text-anchor="middle" class="muted" font-size="12">approved or rejected by its verifiables</text>

  <!-- ===== THE LOOP ===== -->
  <g stroke="#8b949e" stroke-opacity=".85" marker-end="url(#a)">
    <line x1="810" y1="212" x2="810" y2="223"/>
    <line x1="810" y1="262" x2="810" y2="273"/>
    <line x1="810" y1="312" x2="810" y2="323"/>
    <line x1="810" y1="362" x2="810" y2="373"/>
    <line x1="810" y1="412" x2="810" y2="423"/>
  </g>

  <!-- pills -->
  <g font-size="14" text-anchor="middle">
    <rect x="715" y="174" width="190" height="38" rx="19" fill="none" stroke="#8b949e"/>
    <text x="810" y="198" class="ink">ask</text>
    <rect x="715" y="224" width="190" height="38" rx="19" fill="none" stroke="#8b949e"/>
    <text x="810" y="248" class="ink">hypothesize</text>
    <rect x="715" y="274" width="190" height="38" rx="19" fill="none" stroke="#8b949e"/>
    <text x="810" y="298" class="ink">test</text>
    <rect x="715" y="324" width="190" height="38" rx="19" fill="none" stroke="#8b949e"/>
    <text x="810" y="348" class="ink">close</text>
    <rect x="715" y="374" width="190" height="38" rx="19" fill="none" class="accent-s" stroke-width="1.6"/>
    <text x="810" y="398"><tspan class="accent" font-weight="600">review</tspan><tspan class="muted" dx="4">· human</tspan></text>
    <rect x="715" y="424" width="190" height="38" rx="19" fill="none" stroke="#8b949e"/>
    <text x="810" y="448" class="ink">answer / pursue</text>
  </g>

  <!-- loop-back: findings spawn new questions -->
  <path d="M905,443 C963,443 963,193 911,193" fill="none" class="accent-s" stroke-opacity=".55" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#a)"/>
  <text x="958" y="318" class="muted" font-size="11" text-anchor="middle" transform="rotate(90 958 318)">findings → new questions</text>

  <!-- ===== roles ===== -->
  <line x1="44" y1="486" x2="1036" y2="486" stroke="#8b949e" stroke-opacity=".22"/>
  <text x="540" y="514" text-anchor="middle" font-size="13.5">
    <tspan class="ink" font-weight="700">Human</tspan><tspan class="muted" dx="3">decides</tspan>
    <tspan class="muted" dx="16">·</tspan>
    <tspan class="ink" font-weight="700" dx="16">Agent</tspan><tspan class="muted" dx="3">drafts</tspan>
    <tspan class="muted" dx="16">·</tspan>
    <tspan class="ink" font-weight="700" dx="16">Engine</tspan><tspan class="muted" dx="3">records (deterministic)</tspan>
  </text>
</svg>
