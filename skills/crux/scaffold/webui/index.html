<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>crux cockpit</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <!-- the Crux mark: the Southern Cross (same as the repo logo in assets/) -->
      <svg class="mark" viewBox="32 22 66 84" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="mk-l"><line x1="70" y1="30" x2="65" y2="98"/><line x1="40" y1="66" x2="92" y2="60"/></g>
        <g class="mk-s"><circle cx="70" cy="30" r="4.8"/><circle cx="65" cy="98" r="6.4"/><circle cx="40" cy="66" r="4.8"/><circle cx="92" cy="60" r="4"/><circle cx="77" cy="82" r="3"/></g>
      </svg>
      <span class="wordmark">Crux</span>
      <span class="divider"></span>
      <span id="project-title"></span>
    </div>
    <div class="tools">
      <div class="viewctl" role="group" aria-label="Tree view controls">
        <button id="orient-btn" type="button" aria-label="Toggle tree orientation"></button>
        <button id="density-btn" type="button" aria-label="Toggle full-text / compact nodes"></button>
        <button id="focus-btn" type="button" aria-label="Focus open questions"></button>
      </div>
      <input id="search" type="search" placeholder="Search nodes — Enter to jump" autocomplete="off" spellcheck="false">
      <button id="review-btn" type="button">Review (0)</button>
      <button id="theme-btn" type="button" title="Toggle light / dark theme" aria-label="Toggle light / dark theme"></button>
    </div>
  </header>
  <main id="cockpit">
    <section id="tree-pane">
      <svg id="tree" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="crux tree"></svg>
      <button id="legend-btn" type="button" title="Show the color key" aria-label="Show the color key" hidden>Key</button>
      <div id="legend" title="Color key — click a chip to highlight only those nodes"></div>
      <div id="zoom-ctl">
        <button id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
        <button id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
        <button id="zoom-fit" type="button" title="Fit tree to view" aria-label="Fit tree to view">⤢</button>
      </div>
      <div id="help">
        <button id="help-btn" type="button" title="Controls help" aria-label="Toggle controls help">?</button>
        <span class="hint">scroll / pinch = zoom · drag = pan · click a node · ± to collapse</span>
      </div>
    </section>
    <div id="splitter" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
    <aside id="detail-pane">
      <div id="detail-fontctl" title="Text size" aria-label="Detail text size">
        <button data-font="small" type="button" aria-label="Small text">A</button>
        <button data-font="medium" type="button" aria-label="Medium text">A</button>
        <button data-font="large" type="button" aria-label="Large text">A</button>
      </div>
      <div id="detail-content"></div>
    </aside>
  </main>
  <div id="offline" hidden>server disconnected — showing last known state</div>
  <script src="app.js"></script>
</body>
</html>
